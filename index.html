<!DOCTYPE html>
<html>
<head>
  <title>Finance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .nav-item {
      padding: 10px;
      margin: 5px 0;
      background: #1f2937;
      border-radius: 8px;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .top-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    .big {
      font-size: 28px;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    textarea, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    canvas {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>💰 Finance</h2>
  <div class="nav-item">Dashboard</div>
  <div class="nav-item">Transactions</div>
  <div class="nav-item">Insights</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP CARDS -->
  <div class="top-cards">
    <div class="card">
      <div>Total Balance</div>
      <div class="big" id="balance">$0</div>
    </div>

    <div class="card">
      <div>Income</div>
      <div class="big" id="income">$0</div>
    </div>

    <div class="card">
      <div>Expenses</div>
      <div class="big" id="expenses">$0</div>
    </div>
  </div>

  <!-- INPUTS -->
  <div class="grid">

    <div class="card">
      <h3>⚙️ Setup</h3>

      <input type="number" id="startingBalance" placeholder="Starting balance">
      <button onclick="setStartingBalance()">Save</button>

      <textarea id="emailText" rows="5" placeholder="Paste email here"></textarea>
      <button onclick="parseEmail()">Parse Email</button>
    </div>

    <div class="card">
      <h3>📊 Income vs Expenses</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>

  <!-- TRANSACTIONS -->
  <div class="card" style="margin-top:15px;">
    <h3>Transactions</h3>
    <table>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script>

const API_URL = "https://finance-backend-ja91.onrender.com";

let transactions = [];
let startingBalance = 0;
let chart;

// ------------------ LOAD ------------------
async function loadTransactions() {
  const res = await fetch(API_URL + "/transactions");
  transactions = await res.json();
  updateUI();
}

// ------------------ BALANCE ------------------
function setStartingBalance() {
  startingBalance = parseFloat(document.getElementById("startingBalance").value) || 0;
  updateUI();
}

// ------------------ UI ------------------
function updateUI() {

  let balance = startingBalance;
  let income = 0;
  let expenses = 0;

  const table = document.getElementById("table");
  table.innerHTML = "";

  transactions.forEach(t => {
    balance += t.amount;

    if (t.amount >= 0) income += t.amount;
    else expenses += Math.abs(t.amount);

    table.innerHTML += `
      <tr>
        <td>${t.desc}</td>
        <td class="${t.amount >= 0 ? 'positive' : 'negative'}">
          ${t.amount.toFixed(2)}
        </td>
      </tr>
    `;
  });

  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("income").innerText = "$" + income.toFixed(2);
  document.getElementById("expenses").innerText = "$" + expenses.toFixed(2);

  updateChart(income, expenses);
}

// ------------------ CHART ------------------
function updateChart(income, expenses) {

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
      labels: ["Income", "Expenses"],
      datasets: [{
        data: [income, expenses]
      }]
    }
  });
}

// ------------------ EMAIL PARSER ------------------
async function parseEmail() {

  const text = document.getElementById("emailText").value.toLowerCase();
  const match = text.match(/\$([0-9]+(\.[0-9]+)?)/);

  if (!match) return alert("No amount found");

  let amount = parseFloat(match[1]);
  let desc = "Transaction";

  if (text.includes("spent") || text.includes("charged") || text.includes("purchase")) {
    amount *= -1;
    desc = "Expense";
  }

  if (text.includes("deposit") || text.includes("payroll") || text.includes("paid")) {
    desc = "Income";
  }

  await fetch(API_URL + "/transactions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ desc, amount })
  });

  document.getElementById("emailText").value = "";
  loadTransactions();
}

// INIT
loadTransactions();

</script>

</body>
</html>
