<!DOCTYPE html>
<html>
<head>
  <title>Finance Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .column {
      flex: 1;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      height: fit-content;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .positive { color: #4CAF50; }
    .negative { color: #ff4d4d; }

    #balance {
      font-size: 32px;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<h1>💰 Finance Tracker</h1>

<div class="container">

  <!-- LEFT COLUMN -->
  <div class="column">
    <h2>⚙️ Inputs</h2>

    <label>Starting Balance</label>
    <input type="number" id="startingBalance" placeholder="Enter starting balance">
    <button onclick="setStartingBalance()">Save Balance</button>

    <hr style="margin:20px 0; border:1px solid #333;">

    <h2>📧 Email Parser</h2>
    <textarea id="emailText" rows="6" placeholder="Paste email here..."></textarea>
    <button onclick="parseEmail()">Parse Email</button>

    <hr style="margin:20px 0; border:1px solid #333;">

    <h2>💵 Current Balance</h2>
    <div id="balance">$0.00</div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="column">
    <h2>📊 Transactions</h2>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="transactionsTable"></tbody>
    </table>
  </div>

</div>

<script>

const API_URL = "https://finance-backend-ja91.onrender.com";

let transactions = [];
let startingBalance = 0;

// ---------------------------
// LOAD TRANSACTIONS
// ---------------------------
async function loadTransactions() {
  try {
    const res = await fetch(API_URL + "/transactions");
    transactions = await res.json();
    updateUI();
  } catch (err) {
    console.error(err);
  }
}

// ---------------------------
// SET BALANCE
// ---------------------------
function setStartingBalance() {
  startingBalance = parseFloat(
    document.getElementById("startingBalance").value
  ) || 0;

  updateUI();
}

// ---------------------------
// UI UPDATE
// ---------------------------
function updateUI() {
  let balance = startingBalance;

  const table = document.getElementById("transactionsTable");
  table.innerHTML = "";

  transactions.forEach(t => {
    balance += t.amount;

    table.innerHTML += `
      <tr>
        <td>${t.desc}</td>
        <td class="${t.amount >= 0 ? 'positive' : 'negative'}">
          ${t.amount >= 0 ? '+' : ''}${t.amount.toFixed(2)}
        </td>
      </tr>
    `;
  });

  document.getElementById("balance").innerText =
    "$" + balance.toFixed(2);
}

// ---------------------------
// EMAIL PARSER
// ---------------------------
async function parseEmail() {
  const text = document.getElementById("emailText").value.toLowerCase();

  const match = text.match(/\$([0-9]+(\.[0-9]+)?)/);

  if (!match) {
    alert("No amount found");
    return;
  }

  let amount = parseFloat(match[1]);
  let desc = "Transaction";

  if (text.includes("spent") || text.includes("purchase") || text.includes("charged")) {
    amount *= -1;
    desc = "Expense";
  }

  if (text.includes("deposit") || text.includes("payroll") || text.includes("paid")) {
    desc = "Income";
  }

  await fetch(API_URL + "/transactions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ desc, amount })
  });

  document.getElementById("emailText").value = "";

  loadTransactions();
}

// INIT
loadTransactions();

</script>

</body>
</html>
