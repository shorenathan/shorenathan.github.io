<!DOCTYPE html>
<html>
<head>
  <title>Finance Tracker - Level 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #111827;
      height: 100vh;
      padding: 20px;
    }

    .nav-item {
      padding: 10px;
      margin: 6px 0;
      background: #1f2937;
      border-radius: 8px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    .top {
      display: flex;
      gap: 10px;
    }

    .stat {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>💰 Finance</h2>
  <div class="nav-item">Dashboard</div>
  <div class="nav-item">Transactions</div>
  <div class="nav-item">Insights</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="top">
    <div class="stat">
      Balance<br>
      <h2 id="balance">$0</h2>
    </div>
    <div class="stat">
      Income<br>
      <h2 id="income">$0</h2>
    </div>
    <div class="stat">
      Expenses<br>
      <h2 id="expenses">$0</h2>
    </div>
  </div>

  <!-- INPUTS -->
  <div class="card">

    <h3>⚙️ Add Data</h3>

    <input type="number" id="startingBalance" placeholder="Starting balance">
    <button onclick="setStartingBalance()">Save Balance</button>

    <textarea id="emailText" rows="4" placeholder="Paste email"></textarea>
    <button onclick="parseEmail()">Parse Email</button>

  </div>

  <!-- FILTERS -->
  <div class="card">
    <h3>🔎 Filters</h3>

    <div class="row">
      <select id="monthFilter" onchange="updateUI()">
        <option value="all">All Months</option>
      </select>

      <select id="categoryFilter" onchange="updateUI()">
        <option value="all">All Categories</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        <option value="food">Food</option>
        <option value="shopping">Shopping</option>
        <option value="bills">Bills</option>
      </select>
    </div>

    <input type="text" id="search" placeholder="Search transactions..." oninput="updateUI()">
  </div>

  <!-- TRANSACTIONS -->
  <div class="card">
    <h3>Transactions</h3>
    <table>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script>

const API_URL = "https://finance-backend-ja91.onrender.com";

let transactions = [];
let startingBalance = 0;

// ---------------- LOAD ----------------
async function loadTransactions() {
  const res = await fetch(API_URL + "/transactions");
  transactions = await res.json();

  populateMonthFilter();
  updateUI();
}

// ---------------- START BALANCE ----------------
function setStartingBalance() {
  startingBalance = parseFloat(document.getElementById("startingBalance").value) || 0;
  updateUI();
}

// ---------------- MONTH FILTER ----------------
function populateMonthFilter() {
  const months = new Set();

  transactions.forEach(t => {
    const date = new Date(t.date || Date.now());
    months.add(date.getFullYear() + "-" + (date.getMonth() + 1));
  });

  const select = document.getElementById("monthFilter");
  select.innerHTML = `<option value="all">All Months</option>`;

  months.forEach(m => {
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

// ---------------- UI ----------------
function updateUI() {

  let balance = startingBalance;
  let income = 0;
  let expenses = 0;

  const monthFilter = document.getElementById("monthFilter").value;
  const categoryFilter = document.getElementById("categoryFilter").value;
  const search = document.getElementById("search").value.toLowerCase();

  const table = document.getElementById("table");
  table.innerHTML = "";

  transactions.forEach(t => {

    const date = new Date(t.date || Date.now());
    const monthKey = date.getFullYear() + "-" + (date.getMonth() + 1);

    const category = t.category || (t.amount >= 0 ? "income" : "expense");

    // FILTERS
    if (monthFilter !== "all" && monthFilter !== monthKey) return;
    if (categoryFilter !== "all" && categoryFilter !== category) return;
    if (search && !t.desc.toLowerCase().includes(search)) return;

    balance += t.amount;

    if (t.amount >= 0) income += t.amount;
    else expenses += Math.abs(t.amount);

    table.innerHTML += `
      <tr>
        <td>
          ${t.desc}<br>
          <small>${date.toLocaleDateString()}</small>
        </td>
        <td class="${t.amount >= 0 ? 'positive' : 'negative'}">
          ${t.amount.toFixed(2)}
        </td>
      </tr>
    `;
  });

  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("income").innerText = "$" + income.toFixed(2);
  document.getElementById("expenses").innerText = "$" + expenses.toFixed(2);
}

// ---------------- EMAIL PARSER ----------------
async function parseEmail() {

  const text = document.getElementById("emailText").value.toLowerCase();
  const match = text.match(/\$([0-9]+(\.[0-9]+)?)/);

  if (!match) return alert("No amount found");

  let amount = parseFloat(match[1]);

  let desc = "Transaction";
  let category = "expense";

  if (text.includes("spent") || text.includes("charged") || text.includes("purchase")) {
    amount *= -1;
    desc = "Purchase";
    category = "shopping";
  }

  if (text.includes("deposit") || text.includes("payroll") || text.includes("paid")) {
    desc = "Income";
    category = "income";
  }

  if (text.includes("uber") || text.includes("food") || text.includes("restaurant")) {
    category = "food";
  }

  if (text.includes("electric") || text.includes("bill")) {
    category = "bills";
  }

  await fetch(API_URL + "/transactions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      desc,
      amount,
      category,
      date: new Date().toISOString()
    })
  });

  document.getElementById("emailText").value = "";
  loadTransactions();
}

// INIT
loadTransactions();

</script>

</body>
</html>
