<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Profile</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f9f9fb, #eceff4);
      margin: 0;
      padding: 24px;
      color: #333;
    }

    .profile {
      max-width: 420px;
      margin: auto;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .photo {
      height: 360px;
      background: #ddd;
      background-size: cover;
      background-position: center;
    }

    .content {
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .location {
      color: #777;
      font-size: 14px;
      margin-top: 4px;
    }

    .bio {
      margin: 16px 0;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: #f4f6f8;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .stat span {
      display: block;
      color: #777;
      font-size: 12px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section h2 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #ffe8ef;
      color: #b3003c;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="profile">

    <!-- Profile Photo -->
    <div class="photo" style="background-image: url('photo.jpg');"></div>

    <div class="content">

      <!-- Name -->
      <h1>Alex, 29</h1>
      <div class="location">📍  AZ</div>

      <!-- Bio -->
      <p class="bio">
        Software dev by day, tacos by night 🌮  
       
      </p>

      <!-- Quick Stats -->
      <div class="stats">
        <div class="stat">
          5'10"
          <span>Height</span>
        </div>
        <div class="stat">
          Developer
          <span>Work</span>
        </div>
        <div class="stat">
          Gym • Hiking
          <span>Active</span>
        </div>
        <div class="stat">
          Coffee > Tea
          <span>Hot take</span>
        </div>
      </div>

      <!-- Interests -->
      <div class="section">
        <h2>Interests</h2>
        <div class="tags">
          <div class="tag">Live Music</div>
          <div class="tag">Hiking</div>
          <div class="tag">Cooking</div>
          <div class="tag">Travel</div>
          <div class="tag">Dogs</div>
        </div>
      </div>

      <!-- Looking For -->
      <div class="section">
        <h2>Looking For</h2>
        <p>
          Someone kind, curious, and down for spontaneous food adventures.
        </p>
      </div>

    </div>
  </div>

</body>
</html>
