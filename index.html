<!DOCTYPE html>
<html>
<head>
  <title>Finance Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 { text-align: center; }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
    }

    .positive { color: #4CAF50; }
    .negative { color: #ff4d4d; }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }
  </style>
</head>

<body>

<h1>💰 Finance Tracker</h1>

<div class="card">
  <h2>Starting Balance</h2>
  <input type="number" id="startingBalance" placeholder="Enter starting balance">
  <button onclick="setStartingBalance()">Save</button>
</div>

<div class="card">
  <h2>📧 Paste Email</h2>
  <textarea id="emailText" rows="4" placeholder="Paste email content here..."></textarea>
  <button onclick="parseEmail()">Parse Email</button>
</div>

<div class="card">
  <h2>💵 Balance</h2>
  <h1 id="balance">$0.00</h1>
</div>

<div class="card">
  <h2>📊 Transactions</h2>
  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="transactionsTable"></tbody>
  </table>
</div>

<script>
const API_URL = "https://finance-backend-ja91.onrender.com";

let transactions = [];
let startingBalance = 0;

// ===============================
// LOAD DATA
// ===============================
async function loadTransactions() {
  try {
    const res = await fetch(API_URL + "/transactions");
    const data = await res.json();

    transactions = data;
    updateUI();
  } catch (err) {
    console.error("Error loading transactions:", err);
  }
}

// ===============================
// SET STARTING BALANCE
// ===============================
function setStartingBalance() {
  startingBalance = parseFloat(document.getElementById("startingBalance").value) || 0;
  updateUI();
}

// ===============================
// UPDATE UI
// ===============================
function updateUI() {
  let balance = startingBalance;

  const table = document.getElementById("transactionsTable");
  table.innerHTML = "";

  transactions.forEach(t => {
    balance += t.amount;

    table.innerHTML += `
      <tr>
        <td>${t.desc}</td>
        <td class="${t.amount >= 0 ? 'positive' : 'negative'}">
          ${t.amount >= 0 ? '+' : ''}${t.amount.toFixed(2)}
        </td>
      </tr>
    `;
  });

  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
}

// ===============================
// PARSE EMAIL
// ===============================
async function parseEmail() {
  const text = document.getElementById("emailText").value.toLowerCase();

  const match = text.match(/\$([0-9]+(\.[0-9]+)?)/);

  if (!match) {
    alert("No amount found");
    return;
  }

  let amount = parseFloat(match[1]);
  let desc = "Transaction";

  if (text.includes("spent") || text.includes("purchase") || text.includes("charged")) {
    amount *= -1;
    desc = "Card Purchase";
  }

  if (text.includes("deposit") || text.includes("payroll") || text.includes("paid")) {
    desc = "Income";
  }

  // SEND TO BACKEND
  await fetch(API_URL + "/transactions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ desc, amount })
  });

  document.getElementById("emailText").value = "";

  loadTransactions();
}

// ===============================
// INIT
// ===============================
loadTransactions();

</script>

</body>
</html>
